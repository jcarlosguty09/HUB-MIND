<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HUB MIND – WOD</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0b0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HUB MIND" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-theme="dark">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="loading-logo">
      <div class="loading-wordmark">HUB MIND</div>
      <div class="loading-sub">Training Center</div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" class="hidden">
    <div class="login-box">
      <div class="login-brand">
        <div class="login-wordmark">HUB MIND</div>
        <div class="login-sub">Training Center</div>
      </div>
      <div class="login-form">
        <div class="field-group">
          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label class="field-label">Contraseña</label>
          <input class="field-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <label class="remember-label">
          <input type="checkbox" id="remember-me" checked />
          <span>Mantener sesión iniciada</span>
        </label>
        <div class="login-error hidden" id="login-error"></div>
        <button class="launch-btn" id="login-btn"><i class="ti ti-login"></i> Entrar</button>
      </div>
    </div>
  </div>

  <!-- APP (admin/coach) -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <div>
          <div class="brand-name">HUB MIND</div>
          <div class="brand-sub">Training Center</div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="role-badge" id="role-badge"></span>
        <button class="icon-btn" id="theme-toggle"><i class="ti ti-sun"></i></button>
        <button class="icon-btn" id="change-pass-btn" title="Cambiar contraseña"><i class="ti ti-key"></i></button>
        <button class="icon-btn" id="logout-btn"><i class="ti ti-logout"></i></button>
        <div class="sync-dot" id="sync-dot"></div>
      </div>
    </header>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-view="calendar"><i class="ti ti-calendar"></i><span>Calendario</span></button>
      <button class="nav-tab" data-view="today"><i class="ti ti-barbell"></i><span>Hoy</span></button>
      <button class="nav-tab" data-view="history"><i class="ti ti-history"></i><span>Historial</span></button>
    </nav>
    <main class="main-content">
      <section id="view-calendar" class="view active">
        <div class="cal-header">
          <button class="icon-btn" id="prev-month"><i class="ti ti-chevron-left"></i></button>
          <h2 class="cal-month-label" id="cal-month-label"></h2>
          <button class="icon-btn" id="next-month"><i class="ti ti-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="day-panel" id="day-panel" style="display:none">
          <div class="day-panel-header">
            <div>
              <div class="day-panel-date" id="day-panel-date"></div>
              <div class="day-panel-hint">Clases del día</div>
            </div>
            <button class="project-btn" id="project-btn-cal"><i class="ti ti-presentation"></i> Proyectar</button>
          </div>
          <div id="day-content-cal"></div>
        </div>
      </section>
      <section id="view-today" class="view">
        <div class="today-header">
          <div class="today-date" id="today-date-label"></div>
          <button class="project-btn" id="project-btn-today"><i class="ti ti-presentation"></i> Proyectar</button>
        </div>
        <div id="day-content-today"></div>
      </section>
      <section id="view-history" class="view">
        <div class="history-list" id="history-list"></div>
      </section>
    </main>
  </div>

  <!-- APP ATLETA -->
  <div id="app-atleta" class="app hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <div>
          <div class="brand-name">HUB MIND</div>
          <div class="brand-sub">Training Center</div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="role-badge atleta">Atleta</span>
        <button class="icon-btn" id="theme-toggle-atleta"><i class="ti ti-sun"></i></button>
        <button class="icon-btn" id="change-pass-atleta" title="Cambiar contraseña"><i class="ti ti-key"></i></button>
        <button class="icon-btn" id="logout-atleta"><i class="ti ti-logout"></i></button>
      </div>
    </header>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-aview="today"><i class="ti ti-barbell"></i><span>Hoy</span></button>
      <button class="nav-tab" data-aview="tomorrow"><i class="ti ti-calendar-event"></i><span>Mañana</span></button>
    </nav>
    <main class="main-content">
      <section id="aview-today" class="view active">
        <div class="atleta-day-header" id="atleta-today-header"></div>
        <div id="atleta-today-content"></div>
      </section>
      <section id="aview-tomorrow" class="view">
        <div class="atleta-day-header" id="atleta-tomorrow-header"></div>
        <div id="atleta-tomorrow-content"></div>
      </section>
    </main>
  </div>

  <!-- PROJECTION -->
  <div id="projection" class="projection hidden">
    <div class="proj-topbar">
      <div class="proj-brand">HUB MIND</div>
      <div class="proj-meta">
        <span class="proj-class-badge crossfit" id="proj-class-badge">CrossFit</span>
        <span class="proj-section-name" id="proj-section-name"></span>
        <span class="proj-date" id="proj-date"></span>
      </div>
      <div class="proj-nav-group">
        <span class="proj-nav-group-label">Clase</span>
        <div class="proj-nav">
          <button class="proj-nav-btn" id="proj-class-prev"><i class="ti ti-chevron-left"></i></button>
          <span class="proj-nav-label" id="proj-class-label">1 / 1</span>
          <button class="proj-nav-btn" id="proj-class-next"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="proj-nav-group">
        <span class="proj-nav-group-label">Sección</span>
        <div class="proj-nav">
          <button class="proj-nav-btn" id="proj-section-prev"><i class="ti ti-chevron-left"></i></button>
          <span class="proj-nav-label" id="proj-section-label">1 / 1</span>
          <button class="proj-nav-btn" id="proj-section-next"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <button class="close-proj-btn" id="close-proj-btn"><i class="ti ti-x"></i> Salir</button>
    </div>
    <div class="proj-body">
      <div class="proj-wod-panel">
        <div class="proj-wod-label">WOD</div>
        <div class="proj-wod-text" id="proj-wod-text"></div>
      </div>
      <div class="proj-timer-panel">
        <div class="proj-timer-mode-label" id="proj-timer-mode-label">Cronómetro</div>
        <div class="proj-timer-display" id="proj-timer-display">00:00</div>
        <div class="proj-timer-sub" id="proj-timer-sub"></div>
        <div class="proj-phase-bar" id="proj-phase-bar" style="display:none">
          <div class="proj-phase-fill" id="proj-phase-fill"></div>
        </div>
        <div class="proj-round-info" id="proj-round-info" style="display:none">
          Ronda <span id="proj-round-cur">1</span> / <span id="proj-round-total">1</span>
        </div>
        <div class="proj-timer-controls">
          <button class="proj-ctrl-btn reset-btn" id="proj-reset"><i class="ti ti-rotate-clockwise-2"></i></button>
          <button class="proj-ctrl-btn play-btn" id="proj-play"><i class="ti ti-player-play"></i></button>
          <button class="proj-ctrl-btn skip-btn" id="proj-skip"><i class="ti ti-player-skip-forward"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- CHANGE PASSWORD MODAL -->
  <div id="pass-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Cambiar Contraseña</div>
      <div class="field-group">
        <label class="field-label">Nueva contraseña</label>
        <input class="field-input" type="password" id="new-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="field-group">
        <label class="field-label">Confirmar contraseña</label>
        <input class="field-input" type="password" id="confirm-password" placeholder="Repite la contraseña" />
      </div>
      <div class="login-error hidden" id="pass-error"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="pass-cancel">Cancelar</button>
        <button class="save-btn" id="pass-save"><i class="ti ti-check"></i> Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/supabase-client.js"></script>
  <script src="/timer.js"></script>
  <script src="/app.js"></script>
</body>
</html>
