<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HUB MIND – WOD</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0b0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HUB MIND" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-theme="dark">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="loading-logo">
      <div class="loading-wordmark">HUB MIND</div>
      <div class="loading-sub">Training Center</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <header class="topbar">
      <div class="topbar-brand">
        <div>
          <div class="brand-name">HUB MIND</div>
          <div class="brand-sub">Training Center</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Cambiar tema"><i class="ti ti-sun"></i></button>
        <div class="sync-dot" id="sync-dot"></div>
      </div>
    </header>

    <nav class="nav-tabs">
      <button class="nav-tab active" data-view="calendar"><i class="ti ti-calendar"></i><span>Calendario</span></button>
      <button class="nav-tab" data-view="today"><i class="ti ti-barbell"></i><span>Hoy</span></button>
      <button class="nav-tab" data-view="history"><i class="ti ti-history"></i><span>Historial</span></button>
    </nav>

    <main class="main-content">

      <!-- CALENDAR VIEW -->
      <section id="view-calendar" class="view active">
        <div class="cal-header">
          <button class="icon-btn" id="prev-month"><i class="ti ti-chevron-left"></i></button>
          <h2 class="cal-month-label" id="cal-month-label">Junio 2026</h2>
          <button class="icon-btn" id="next-month"><i class="ti ti-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="day-panel" id="day-panel" style="display:none">
          <div class="day-panel-header">
            <div>
              <div class="day-panel-date" id="day-panel-date"></div>
              <div class="day-panel-hint">Secciones del día</div>
            </div>
            <button class="project-btn" id="project-btn-cal"><i class="ti ti-presentation"></i> Proyectar</button>
          </div>
          <div id="sections-cal" class="sections-list"></div>
          <button class="add-section-btn" id="add-section-cal"><i class="ti ti-plus"></i> Agregar sección</button>
        </div>
      </section>

      <!-- TODAY VIEW -->
      <section id="view-today" class="view">
        <div class="today-header">
          <div class="today-date" id="today-date-label"></div>
          <button class="project-btn" id="project-btn-today"><i class="ti ti-presentation"></i> Proyectar</button>
        </div>
        <div id="sections-today" class="sections-list"></div>
        <button class="add-section-btn" id="add-section-today"><i class="ti ti-plus"></i> Agregar sección</button>
      </section>

      <!-- HISTORY VIEW -->
      <section id="view-history" class="view">
        <div class="history-list" id="history-list"></div>
      </section>

    </main>
  </div>

  <!-- PROJECTION -->
  <div id="projection" class="projection hidden">
    <div class="proj-topbar">
      <div class="proj-brand">HUB MIND</div>
      <div class="proj-meta">
        <span class="proj-section-name" id="proj-section-name"></span>
        <span class="proj-date" id="proj-date"></span>
      </div>
      <div class="proj-nav">
        <button class="proj-nav-btn" id="proj-prev"><i class="ti ti-chevron-left"></i></button>
        <span class="proj-nav-label" id="proj-nav-label">1 / 1</span>
        <button class="proj-nav-btn" id="proj-next"><i class="ti ti-chevron-right"></i></button>
      </div>
      <button class="close-proj-btn" id="close-proj-btn"><i class="ti ti-x"></i> Salir</button>
    </div>
    <div class="proj-body">
      <div class="proj-wod-panel">
        <div class="proj-wod-label">WOD</div>
        <div class="proj-wod-text" id="proj-wod-text"></div>
      </div>
      <div class="proj-timer-panel">
        <div class="proj-timer-mode-label" id="proj-timer-mode-label">Cronómetro</div>
        <div class="proj-timer-display" id="proj-timer-display">00:00</div>
        <div class="proj-timer-sub" id="proj-timer-sub"></div>
        <div class="proj-phase-bar" id="proj-phase-bar" style="display:none">
          <div class="proj-phase-fill" id="proj-phase-fill"></div>
        </div>
        <div class="proj-round-info" id="proj-round-info" style="display:none">
          Ronda <span id="proj-round-cur">1</span> / <span id="proj-round-total">1</span>
        </div>
        <div class="proj-timer-controls">
          <button class="proj-ctrl-btn reset-btn" id="proj-reset"><i class="ti ti-rotate-clockwise-2"></i></button>
          <button class="proj-ctrl-btn play-btn" id="proj-play"><i class="ti ti-player-play"></i></button>
          <button class="proj-ctrl-btn skip-btn" id="proj-skip"><i class="ti ti-player-skip-forward"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/supabase-client.js"></script>
  <script src="/timer.js"></script>
  <script src="/app.js"></script>
</body>
</html>
